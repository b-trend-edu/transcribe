services:
  app:
    # Image is built & pushed by GitHub Actions (.github/workflows/build.yml);
    # Coolify pulls it — it does not build from source. Override the tag with
    # ${IMAGE_TAG} in Coolify if you want to pin a specific build.
    image: ghcr.io/b-trend-edu/transcribe:${IMAGE_TAG:-latest}
    pull_policy: always
    # torch 2.8.0 cu128 wheels are amd64-only (see Dockerfile).
    platform: linux/amd64
    # GPU access. The host has the nvidia runtime registered but NOT as the
    # default runtime, so the container must ask for it explicitly — this is the
    # equivalent of `docker run --gpus all`. The `deploy.reservations.devices`
    # block below is the compose-native way, but Coolify/plain `docker compose`
    # often ignore `deploy.resources`, which is why the app booted without a GPU
    # (CUDA error 803). `runtime: nvidia` + NVIDIA_VISIBLE_DEVICES is honored in
    # all cases. Requires the nvidia-container-runtime on the host.
    runtime: nvidia
    ports:
      # Publish the app ONLY on the host's Tailscale IP, so it is reachable over
      # the tailnet (http://<tailnet-ip>:3000 or http://<magicdns-name>:3000) but
      # NOT on any public/LAN interface. Set TAILSCALE_IP in Coolify to this
      # host's `tailscale ip -4`. (If TAILSCALE_IP is empty it binds all
      # interfaces — don't leave it blank on a public host.)
      - "${TAILSCALE_IP}:3000:3000"
    environment:
      - BBB_BASE_URL=${BBB_BASE_URL}
      - BBB_SHARED_SECRET=${BBB_SHARED_SECRET}
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
      - INNGEST_BASE_URL=http://inngest:8288
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      # Force the spoken language (e.g. de); leave blank to auto-detect per recording.
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-}
      # Push the finished VTT back to the BBB recording as a caption track.
      - PUBLISH_CAPTIONS=${PUBLISH_CAPTIONS:-true}
      # Read recording media from the mounted BBB dir (see volumes) instead of
      # downloading over HTTP. Must match the container-side mount path below.
      - RECORDINGS_DIR=${RECORDINGS_DIR:-/recordings}
      - MANUAL_INGEST_ENABLED=${MANUAL_INGEST_ENABLED:-false}
      # Max simultaneous transcriptions. Keep at 1 for a single GPU.
      - TRANSCRIBE_CONCURRENCY=${TRANSCRIBE_CONCURRENCY:-1}
      - DATABASE_URL=postgres://inngest:${POSTGRES_PASSWORD}@postgres:5432/transcribe
      # ---- GPU visibility (paired with `runtime: nvidia` above) ----
      # The nvidia/cuda base image sets sensible defaults, but pin them explicitly
      # so the app container always sees all GPUs with compute+utility caps.
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # ---- WhisperX (GPU + speaker diarization) ----
      - WHISPERX_DEVICE=${WHISPERX_DEVICE:-cuda}
      - WHISPERX_COMPUTE_TYPE=${WHISPERX_COMPUTE_TYPE:-float16}
      - WHISPERX_BATCH_SIZE=${WHISPERX_BATCH_SIZE:-16}
      - DIARIZE=${DIARIZE:-false}
      - MIN_SPEAKERS=${MIN_SPEAKERS:-}
      - MAX_SPEAKERS=${MAX_SPEAKERS:-}
      # HuggingFace read token for the gated pyannote diarization models.
      # The token's account MUST have accepted the pyannote model licenses.
      - HF_TOKEN=${HF_TOKEN:-}
      # keep the weight-cache env aligned with the volume mount below
      - HF_HOME=/models/huggingface
      - TORCH_HOME=/models/torch
      - XDG_CACHE_HOME=/models/cache
    volumes:
      # persist whisper / align / pyannote weights across restarts & redeploys
      - whisperx_models:/models
      # Read recording media directly from the BBB host (same box), read-only.
      # Host path is deployment-specific — override with RECORDINGS_HOST_DIR in
      # Coolify. Default is the standard BBB published dir; some setups use
      # /var/bigbluebutton/presentation instead. Captions are still written back
      # via the putRecordingTextTrack API, not this mount.
      - ${RECORDINGS_HOST_DIR:-/var/bigbluebutton/published/presentation}:/recordings:ro
    depends_on:
      inngest:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16g     # host RAM; VRAM is the real ceiling (large-v3 + diarization ~10-13 GB)
        reservations:
          memory: 2g
          # Redundant belt-and-suspenders for engines that DO honor deploy.devices
          # (e.g. plain `docker compose up`). The real GPU handoff is `runtime:
          # nvidia` + NVIDIA_VISIBLE_DEVICES above, since Coolify ignores this block.
          devices:
            - driver: nvidia
              count: all           # or `count: 1` / `device_ids: ["0"]` (count & device_ids are mutually exclusive)
              capabilities: [gpu]

  inngest:
    image: inngest/inngest
    command: "inngest start"
    # 8288 = Inngest dashboard/API — published on the Tailscale IP only, so the
    # dashboard is reachable over the tailnet (http://<tailnet-ip>:8288) but not
    # publicly. 8289 = internal connect gateway; kept off the host (the app
    # reaches it in-network via INNGEST_BASE_URL=http://inngest:8288).
    ports:
      - "${TAILSCALE_IP}:8288:8288"
    expose:
      - "8289"
    environment:
      # Both keys must be hex strings with an even number of characters
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
      - INNGEST_POSTGRES_URI=postgres://inngest:${POSTGRES_PASSWORD}@postgres:5432/inngest
      - INNGEST_REDIS_URI=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # The inngest/inngest image ships no curl/wget/nc — only bash. Probe /health
      # via bash's /dev/tcp (dash, the default sh, does not support /dev/tcp).
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8288 && printf 'GET /health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q ' 200 ' <&3"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_DB=inngest
      - POSTGRES_USER=inngest
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inngest -d inngest"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

volumes:
  postgres_data:
  redis_data:
  whisperx_models:   # persistent HF/torch/whisper model + weight cache (mounted at /models in `app`)
