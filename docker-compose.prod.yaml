services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - BBB_BASE_URL=${BBB_BASE_URL}
      - BBB_SHARED_SECRET=${BBB_SHARED_SECRET}
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
      - INNGEST_BASE_URL=http://inngest:8288
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - MANUAL_INGEST_ENABLED=${MANUAL_INGEST_ENABLED:-false}
      - DATABASE_URL=postgres://inngest:${POSTGRES_PASSWORD}@postgres:5432/transcribe
    depends_on:
      inngest:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16g     # Whisper large=~10g, medium=~5g, base=~1g — 2 concurrent jobs need 2x
        reservations:
          memory: 2g

  inngest:
    image: inngest/inngest
    command: "inngest start"
    expose:
      - "8288"
      - "8289"
    environment:
      # Both keys must be hex strings with an even number of characters
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
      - INNGEST_POSTGRES_URI=postgres://inngest:${POSTGRES_PASSWORD}@postgres:5432/inngest
      - INNGEST_REDIS_URI=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8288/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_DB=inngest
      - POSTGRES_USER=inngest
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inngest -d inngest"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

volumes:
  postgres_data:
  redis_data:
