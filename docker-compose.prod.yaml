services:
  app:
    # Image is built & pushed by GitHub Actions (.github/workflows/build.yml);
    # Coolify pulls it — it does not build from source. Override the tag with
    # ${IMAGE_TAG} in Coolify if you want to pin a specific build.
    image: ghcr.io/artzkaizen/transcribe:${IMAGE_TAG:-latest}
    pull_policy: always
    # torch 2.8.0 cu128 wheels are amd64-only (see Dockerfile).
    platform: linux/amd64
    expose:
      - "3000"
    environment:
      - BBB_BASE_URL=${BBB_BASE_URL}
      - BBB_SHARED_SECRET=${BBB_SHARED_SECRET}
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
      - INNGEST_BASE_URL=http://inngest:8288
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - MANUAL_INGEST_ENABLED=${MANUAL_INGEST_ENABLED:-false}
      - DATABASE_URL=postgres://inngest:${POSTGRES_PASSWORD}@postgres:5432/transcribe
      # ---- WhisperX (GPU + speaker diarization) ----
      - WHISPERX_DEVICE=${WHISPERX_DEVICE:-cuda}
      - WHISPERX_COMPUTE_TYPE=${WHISPERX_COMPUTE_TYPE:-float16}
      - WHISPERX_BATCH_SIZE=${WHISPERX_BATCH_SIZE:-16}
      - DIARIZE=${DIARIZE:-false}
      - MIN_SPEAKERS=${MIN_SPEAKERS:-}
      - MAX_SPEAKERS=${MAX_SPEAKERS:-}
      # HuggingFace read token for the gated pyannote diarization models.
      # The token's account MUST have accepted the pyannote model licenses.
      - HF_TOKEN=${HF_TOKEN:-}
      # keep the weight-cache env aligned with the volume mount below
      - HF_HOME=/models/huggingface
      - TORCH_HOME=/models/torch
      - XDG_CACHE_HOME=/models/cache
    volumes:
      # persist whisper / align / pyannote weights across restarts & redeploys
      - whisperx_models:/models
    depends_on:
      inngest:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16g     # host RAM; VRAM is the real ceiling (large-v3 + diarization ~10-13 GB)
        reservations:
          memory: 2g
          # ---- GPU access (NVIDIA Container Toolkit required on the host) ----
          devices:
            - driver: nvidia
              count: all           # or `count: 1` / `device_ids: ["0"]` (count & device_ids are mutually exclusive)
              capabilities: [gpu]

  inngest:
    image: inngest/inngest
    command: "inngest start"
    expose:
      - "8288"
      - "8289"
    environment:
      # Both keys must be hex strings with an even number of characters
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
      - INNGEST_POSTGRES_URI=postgres://inngest:${POSTGRES_PASSWORD}@postgres:5432/inngest
      - INNGEST_REDIS_URI=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8288/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_DB=inngest
      - POSTGRES_USER=inngest
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inngest -d inngest"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

volumes:
  postgres_data:
  redis_data:
  whisperx_models:   # persistent HF/torch/whisper model + weight cache (mounted at /models in `app`)
